<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box">

<h1>Admin Panel</h1>

<table border="1" width="100%">
<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Role</th>
    <th>Created</th>
    <th>Action</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.id }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.role }}</td>
    <td>{{ user.created_at }}</td>
    <td>
    <a href="/delete-user/{{ user.id }}">
        Delete
    </a>
</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">
    <button>Dashboard</button>
</a>

</div>

</body>
</html>
