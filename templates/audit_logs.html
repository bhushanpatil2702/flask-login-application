{% extends "base.html" %}

{% block title %}
Audit Logs
{% endblock %}

{% block content %}

<h2>Audit Logs</h2>

<div class="card">

    <div class="card-body">

        <table class="table table-striped">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Action</th>
                    <th>Timestamp</th>
                </tr>

            </thead>

            <tbody>

                {% for log in logs %}

                <tr>

                    <td>{{ log.id }}</td>

                    <td>{{ log.username }}</td>

                    <td>{{ log.action }}</td>

                    <td>{{ log.created_at }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
