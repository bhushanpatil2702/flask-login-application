{% extends "base.html" %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card">

        <div class="card-header">
            Forgot Password
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Email Address</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Generate Reset Link

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
