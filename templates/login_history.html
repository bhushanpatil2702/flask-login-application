{% extends "base.html" %}

{% block title %}
Login History
{% endblock %}

{% block content %}

<h2 class="mb-4">
    Login History
</h2>

<div class="card">

    <div class="card-body">

        <table class="table table-striped">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>IP Address</th>
                    <th>Login Time</th>
                </tr>

            </thead>

            <tbody>

                {% for log in logs %}

                <tr>

                    <td>{{ log.id }}</td>
                    <td>{{ log.username }}</td>
                    <td>{{ log.ip_address }}</td>
                    <td>{{ log.login_time }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
