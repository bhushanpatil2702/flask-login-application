{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<h2>My Profile</h2>

<form action="/update-profile"
      method="POST">

<div class="mb-3">

<label>Username</label>

<input
    type="text"
    class="form-control"
    value="{{ user.username }}"
    disabled>

</div>

<div class="mb-3">

<label>Email</label>

<input
    type="email"
    class="form-control"
    value="{{ user.email }}"
    disabled>

</div>

<div class="mb-3">

<label>First Name</label>

<input
    type="text"
    name="first_name"
    class="form-control"
    value="{{ user.first_name or '' }}">

</div>

<div class="mb-3">

<label>Last Name</label>

<input
    type="text"
    name="last_name"
    class="form-control"
    value="{{ user.last_name or '' }}">

</div>

<div class="mb-3">

<label>Phone</label>

<input
    type="text"
    name="phone"
    class="form-control"
    value="{{ user.phone or '' }}">

</div>

<button
    class="btn btn-primary">

    Save Profile

</button>

</form>

{% endblock %}
