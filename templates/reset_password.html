{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card">

        <div class="card-header">
            Reset Password
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>New Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Update Password

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
