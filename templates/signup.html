<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box">

<h2>Sign Up</h2>

<form id="signupForm">

<input type="text"
       name="username"
       placeholder="Username"
       required>

<input type="email"
       name="email"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">
Create Account
</button>

</form>

<div id="message"></div>

</div>

<script>

document.getElementById("signupForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch("/signup",{
        method:"POST",
        body:formData
    });

    const result = await response.json();

    document.getElementById("message").innerHTML =
    result.message;

});

</script>

</body>
</html>
